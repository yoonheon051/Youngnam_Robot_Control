<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영남향우회</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2b;
      --text:#eaf0ff;
      --muted:#a9b4d6;
      --primary:#4f8cff;
      --warning:#ffb020;
      --danger:#ff4d4d;
      --ring: rgba(79,140,255,.35);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 700px at 30% 20%, #1a2a55 0%, var(--bg) 55%);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color:var(--text);
    }
    .wrap{
      width:min(560px, 92vw);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:28px 22px 22px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      text-align:center;
      backdrop-filter: blur(10px);
    }
    .logo{
      width:min(220px, 55vw);
      height:auto;
      display:block;
      margin: 0 auto 14px;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
    }
    h1{
      margin:0 0 6px;
      font-size: 26px;
      letter-spacing: -0.5px;
    }
    .sub{
      margin:0 0 20px;
      color:var(--muted);
      font-size: 13px;
    }
    .btn-row{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      border:0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor:pointer;
      color: #0b1220;
      min-width: 140px;
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      outline: none;
    }
    button:active{ transform: translateY(1px); }
    button:focus-visible{ box-shadow: 0 0 0 4px var(--ring), 0 10px 22px rgba(0,0,0,.25); }

    #btn-start{ background: var(--primary); }
    #btn-pause{ background: var(--warning); }
    #btn-stop{  background: var(--danger);  color: #fff; }

    .hint{
      margin-top:14px;
      font-size:12px;
      color: var(--muted);
      line-height: 1.45;
    }
    .status{
      margin-top:10px;
      font-size:13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="wrap">
    <!-- ✅ 여기 PNG 파일명만 네 환경에 맞게 바꾸면 됨 -->
    <img class="logo" src="yh_3.png" alt="영남향우회 로고" />

    <h1>영남향우회</h1>
    <p class="sub">원격 제어 패널</p>

    <div class="btn-row">
      <button id="btn-start">시작</button>
      <button id="btn-pause">일시정지</button>
      <button id="btn-stop">중지</button>
    </div>

    <div class="status" id="ui-status">상태: 대기</div>
    <div class="hint">※ ‘일시정지’를 누르면 ‘계속’으로 바뀝니다.</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const app = initializeApp({
      databaseURL: "https://farm-9b777-default-rtdb.asia-southeast1.firebasedatabase.app/"
    });
    const db = getDatabase(app);

    let paused = false;

    const btnStart = document.getElementById("btn-start");
    const btnPause = document.getElementById("btn-pause");
    const btnStop  = document.getElementById("btn-stop");
    const uiStatus = document.getElementById("ui-status");

    function setStatus(text){
      uiStatus.textContent = `상태: ${text}`;
    }

    btnStart.onclick = async () => {
      await set(ref(db, "command"), { cmd: "start" });
      paused = false;
      btnPause.textContent = "일시정지";
      setStatus("시작 신호 전송");
    };

    btnPause.onclick = async () => {
      const cmd = paused ? "continue" : "pause";
      await set(ref(db, "command"), { cmd });
      paused = !paused;
      btnPause.textContent = paused ? "계속" : "일시정지";
      setStatus(paused ? "일시정지 신호 전송" : "계속 신호 전송");
    };

    btnStop.onclick = async () => {
      await set(ref(db, "command"), { cmd: "stop" });
      paused = false;
      btnPause.textContent = "일시정지";
      setStatus("중지 신호 전송");
    };
  </script>

</body>
</html>
